<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Route 54 Bistro – Order Poster</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@700;900&family=Nunito:wght@800;900&display=swap" rel="stylesheet" />
  <style>
    @page { size: A4 portrait; margin: 0; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #FF6B35;
      --red:    #FF2D55;
      --green:  #39FF14;
      --white:  #FFFFFF;
      --bg:     #0a0a0a;
    }

    html, body {
      width: 794px;   /* A4 at 96dpi */
      height: 1123px;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Nunito', sans-serif;
    }

    /* ─── POSTER WRAPPER ─── */
    .poster {
      width: 794px;
      height: 1123px;
      position: relative;
      background: var(--bg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ─── BACKGROUND GRID ─── */
    .grid {
      position: absolute; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.025) 39px, rgba(255,255,255,0.025) 40px),
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.025) 39px, rgba(255,255,255,0.025) 40px);
    }

    /* ─── GLOW ORBS ─── */
    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(80px); pointer-events: none; z-index: 0;
    }
    .orb--tl { width: 400px; height: 400px; top: -120px; left: -100px;
      background: radial-gradient(circle, rgba(255,107,53,0.5), transparent 70%); }
    .orb--tr { width: 300px; height: 300px; top: 60px; right: -80px;
      background: radial-gradient(circle, rgba(255,45,85,0.4), transparent 70%); }
    .orb--bl { width: 350px; height: 350px; bottom: 80px; left: -60px;
      background: radial-gradient(circle, rgba(255,45,85,0.3), transparent 70%); }
    .orb--br { width: 380px; height: 380px; bottom: -100px; right: -80px;
      background: radial-gradient(circle, rgba(255,107,53,0.35), transparent 70%); }
    .orb--center { width: 500px; height: 300px; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(ellipse, rgba(255,107,53,0.08), transparent 70%); }

    /* ─── CORNER BRACKETS ─── */
    .corner {
      position: absolute; width: 50px; height: 50px; z-index: 5;
    }
    .corner::before, .corner::after {
      content: ''; position: absolute;
      background: var(--orange);
      box-shadow: 0 0 8px rgba(255,107,53,0.9), 0 0 20px rgba(255,107,53,0.5);
    }
    .corner::before { width: 100%; height: 3px; top: 0; left: 0; }
    .corner::after  { width: 3px; height: 100%; top: 0; left: 0; }
    .corner--tl { top: 18px; left: 18px; }
    .corner--tr { top: 18px; right: 18px; transform: scaleX(-1); }
    .corner--bl { bottom: 18px; left: 18px; transform: scaleY(-1); }
    .corner--br { bottom: 18px; right: 18px; transform: scale(-1); }

    /* ─── CONTENT LAYER ─── */
    .content {
      position: relative; z-index: 10;
      width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center;
      padding: 36px 40px 28px;
    }

    /* ─── TOP STRIPE ─── */
    .top-stripe {
      width: 100%; height: 4px;
      background: linear-gradient(90deg, transparent, var(--orange) 20%, var(--red) 50%, var(--orange) 80%, transparent);
      border-radius: 2px; margin-bottom: 14px;
      box-shadow: 0 0 12px rgba(255,107,53,0.9), 0 0 30px rgba(255,45,85,0.5);
      flex-shrink: 0;
    }

    /* ─── LOGO BLOCK ─── */
    .logo-block {
      display: flex; flex-direction: row; align-items: center; gap: 16px;
      margin-bottom: 40px; flex-shrink: 0;
    }

    .logo-img {
      width: 90px; height: 90px;
      border-radius: 18px; object-fit: cover;
      border: 2px solid rgba(255,107,53,0.7);
      box-shadow: 0 0 20px rgba(255,107,53,0.7), 0 0 50px rgba(255,107,53,0.3);
    }

    .brand {
      display: flex; flex-direction: column; align-items: flex-start; line-height: 1;
    }
    .brand-name {
      font-family: 'Orbitron', sans-serif;
      font-size: 54px; letter-spacing: 0.12em;
      line-height: 1.1;
      font-weight: 900;
    }
    .brand-route { color: #fff; }
    .brand-54 {
      color: var(--orange);
      text-shadow: 0 0 15px rgba(255,107,53,1), 0 0 40px rgba(255,107,53,0.6);
    }
    .brand-bistro {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 15px; font-weight: 400;
      letter-spacing: 0.55em;
      color: var(--red);
      text-shadow: 0 0 10px rgba(255,45,85,0.9);
      margin-top: 4px;
    }

    /* ─── FOOD ICONS ─── */
    .food-row {
      font-size: 28px;
      letter-spacing: 8px;
      margin-bottom: 16px; flex-shrink: 0;
      opacity: 0.85;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    /* ─── MAIN HEADLINE ─── */
    .headline {
      text-align: center; margin-bottom: 8px; flex-shrink: 0;
      line-height: 0.88;
    }

    .hl-scan {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 78px; letter-spacing: 0.04em;
      color: #ffffff;
      display: block;
      text-shadow: 0 4px 20px rgba(0,0,0,0.6), 0 0 40px rgba(255,255,255,0.05);
    }

    .hl-here {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 78px; letter-spacing: 0.04em;
      background: linear-gradient(135deg, #FF6B35 0%, #FF2D55 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: block;
      filter: drop-shadow(0 0 18px rgba(255,107,53,0.8));
    }

    .hl-to {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px; font-weight: 700;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.5em;
      display: block;
      margin: 2px 0;
    }

    .hl-order {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 100px; letter-spacing: 0.04em;
      background: linear-gradient(135deg, #FF6B35 0%, #FF2D55 60%, #FF6B35 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: block;
      filter: drop-shadow(0 0 25px rgba(255,107,53,0.7));
    }

    /* ─── DIVIDER ─── */
    .divider {
      width: 85%; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,107,53,0.7) 30%, rgba(255,45,85,0.7) 70%, transparent);
      margin: 6px 0; flex-shrink: 0;
    }

    /* ─── QR SECTION ─── */
    .qr-section {
      display: flex; flex-direction: column;
      align-items: center; gap: 8px;
      flex-shrink: 0; margin: 4px 0;
    }

    .scan-hint {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px; font-weight: 700;
      color: var(--orange);
      letter-spacing: 0.2em;
      text-shadow: 0 0 10px rgba(255,107,53,0.8);
    }

    .qr-frame {
      position: relative;
      padding: 14px;
      background: rgba(255,255,255,0.02);
      border-radius: 18px;
      border: 2px solid rgba(255,107,53,0.45);
      box-shadow: 0 0 40px rgba(255,107,53,0.2), inset 0 0 30px rgba(255,107,53,0.04);
    }

    /* Animated corner scan brackets on QR */
    .qr-frame::before, .qr-frame::after {
      content: ''; position: absolute;
      width: 28px; height: 28px;
      border: 3px solid var(--orange);
      border-radius: 4px;
      box-shadow: 0 0 10px rgba(255,107,53,1);
    }
    .qr-frame::before { top: 7px; left: 7px; border-right: none; border-bottom: none; }
    .qr-frame::after  { bottom: 7px; right: 7px; border-left: none; border-top: none; }

    /* Extra corner brackets via inner divs */
    .qr-corner-tr, .qr-corner-bl {
      position: absolute;
      width: 28px; height: 28px;
      border: 3px solid var(--orange);
      border-radius: 4px;
      box-shadow: 0 0 10px rgba(255,107,53,1);
    }
    .qr-corner-tr { top: 7px; right: 7px; border-left: none; border-bottom: none; }
    .qr-corner-bl { bottom: 7px; left: 7px; border-right: none; border-top: none; }

    .qr-img {
      display: block;
      width: 420px; height: 420px;
      border-radius: 8px;
      background: #ffffff;
      padding: 12px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      /* grayscale removes green tint, invert flips to black-on-white for printing */
      filter: grayscale(1) invert(1);
    }

    /* ─── FEATURES ─── */
    .features {
      display: flex; gap: 8px; flex-wrap: wrap;
      justify-content: center;
      margin: 6px 0; flex-shrink: 0;
    }

    .chip {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 99px;
      border: 1.5px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(4px);
    }
    .chip-icon { font-size: 14px; }
    .chip-text {
      font-family: 'Nunito', sans-serif;
      font-size: 11px; font-weight: 900;
      color: rgba(255,255,255,0.8);
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    /* ─── BOTTOM BAR ─── */
    .bottom {
      margin-top: auto; width: 100%;
      display: flex; flex-direction: column;
      align-items: center; gap: 8px;
      flex-shrink: 0;
    }

    .bottom-stripe {
      width: 100%; height: 4px;
      background: linear-gradient(90deg, transparent, var(--red) 20%, var(--orange) 50%, var(--red) 80%, transparent);
      border-radius: 2px;
      box-shadow: 0 0 12px rgba(255,45,85,0.9);
    }

    .tagline {
      font-family: 'Orbitron', sans-serif;
      font-size: 9px; font-weight: 700;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.3em; text-align: center;
    }

    @media print {
      body, html { background: #0a0a0a; }
      * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }

    @media screen {
      body { background: #111; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; width: 100%; height: auto; overflow: auto; }
      .poster { margin: 40px auto; box-shadow: 0 0 80px rgba(255,107,53,0.25), 0 40px 120px rgba(0,0,0,0.9); }
      .print-btn {
        position: fixed; top: 16px; right: 16px;
        padding: 10px 22px; border: none; border-radius: 30px; cursor: pointer;
        background: linear-gradient(135deg, #FF6B35, #FF2D55);
        color: white; font-family: 'Nunito', sans-serif;
        font-size: 14px; font-weight: 900;
        box-shadow: 0 4px 20px rgba(255,107,53,0.6);
        z-index: 999; transition: transform 0.2s;
      }
      .print-btn:hover { transform: scale(1.05); }
    }
  </style>
</head>
<body>
  <button class="print-btn" onclick="window.print()">🖨️ Print Poster</button>

  <div class="poster">
    <!-- Backgrounds -->
    <div class="grid"></div>
    <div class="orb orb--tl"></div>
    <div class="orb orb--tr"></div>
    <div class="orb orb--bl"></div>
    <div class="orb orb--br"></div>
    <div class="orb orb--center"></div>

    <!-- Corner brackets -->
    <div class="corner corner--tl"></div>
    <div class="corner corner--tr"></div>
    <div class="corner corner--bl"></div>
    <div class="corner corner--br"></div>

    <div class="content">
      <!-- Top stripe -->
      <div class="top-stripe"></div>

      <!-- Logo -->
      <div class="logo-block">
        <img src="logo-app.png" alt="Route 54 Bistro" class="logo-img" />
        <div class="brand">
          <div><span class="brand-route">ROUTE </span><span class="brand-54">54</span></div>
          <div class="brand-bistro">BISTRO</div>
        </div>
      </div>

      <!-- Food emojis removed -->

      <!-- Main headline -->
      <div class="headline">
        <span class="hl-scan">SCAN</span>
        <span class="hl-here">HERE</span>
        <span class="hl-to">— TO —</span>
        <span class="hl-order">ORDER</span>
      </div>

      <div class="divider"></div>

      <!-- QR section -->
      <div class="qr-section">
        <div class="scan-hint">⬇ POINT YOUR CAMERA HERE ⬇</div>
        <div class="qr-frame">
          <div class="qr-corner-tr"></div>
          <div class="qr-corner-bl"></div>
          <img src="customer-qr.png" alt="Scan to order" class="qr-img" />
        </div>
        <div class="scan-hint" style="font-size:9px; color:rgba(255,255,255,0.4); text-shadow:none; letter-spacing:0.15em;">USE ANY CAMERA APP &nbsp;·&nbsp; NO APP NEEDED</div>
      </div>

      <!-- Features -->
      <div class="features">
        <div class="chip"><span class="chip-icon">⚡</span><span class="chip-text">INSTANT MENU</span></div>
        <div class="chip"><span class="chip-icon">💵</span><span class="chip-text">CASH / UPI</span></div>
        <div class="chip"><span class="chip-icon">🔥</span><span class="chip-text">FRESH &amp; HOT</span></div>
        <div class="chip"><span class="chip-icon">📱</span><span class="chip-text">NO APP NEEDED</span></div>
      </div>

      <!-- Bottom -->
      <div class="bottom">
        <div class="bottom-stripe"></div>
        <div class="tagline">ROUTE 54 BISTRO &nbsp;·&nbsp; ORDER SMARTER &nbsp;·&nbsp; EAT BETTER</div>
      </div>
    </div>
  </div>
</body>
</html>
